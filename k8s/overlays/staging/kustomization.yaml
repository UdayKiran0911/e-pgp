# Staging overlay (Phase 10 Module 4): mirrors prod's replica count so
# staging catches multi-replica issues (e.g. the local-disk upload gap
# noted in the base api-deployment.yaml) before prod does, but on a
# separate `staging-` prefixed namespace so it never collides with prod.
# `kubectl apply -k k8s/overlays/staging`.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: staging-
namespace: epg-platform-staging
resources:
  - ../../base
configMapGenerator:
  - name: epg-config
    behavior: merge
    literals:
      - NODE_ENV=production
