# Template only — never commit real values. Copy to secret.yaml (gitignored
# alongside every other *.local.yaml in this directory), fill in real
# secrets, and apply it out-of-band (`kubectl apply -f secret.yaml`) rather
# than via Kustomize/CI, so secrets never touch the git history.
apiVersion: v1
kind: Secret
metadata:
  name: epg-secrets
  namespace: epg-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@host:5432/epg_platform?sslmode=require"
  JWT_SECRET: "change-me-in-every-environment"
  # 32-byte hex key (64 hex chars) — see apps/api/.env.example for how to
  # generate one. Used by EncryptionService (Phase 9 Module 5).
  ENCRYPTION_KEY: "change-me-64-hex-chars-in-every-environment"
