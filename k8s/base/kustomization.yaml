apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: epg-platform
resources:
  - namespace.yaml
  - configmap.yaml
  - api-deployment.yaml
  - api-service.yaml
  - web-deployment.yaml
  - web-service.yaml
  - ingress.yaml
# secret.yaml is intentionally NOT listed here — apply it separately
# (kubectl apply -f secret.yaml) so real secrets never flow through a
# Kustomize build/CI pipeline. Copy secret.example.yaml to get started.
