name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"

jobs:
  lint-typecheck-unit:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm ui-audit --all
      - run: pnpm test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: epg
          POSTGRES_PASSWORD: epg_dev_password
          POSTGRES_DB: epg_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U epg -d epg_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://epg:epg_dev_password@localhost:5432/epg_platform?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Run migrations
        working-directory: apps/api
        run: npx prisma migrate deploy

      - run: pnpm --filter api test:integration

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: [lint-typecheck-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Build web
        run: pnpm --filter web build

      - name: Run Playwright e2e
        working-directory: apps/web
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  docker-build:
    name: Docker build (web + api)
    runs-on: ubuntu-latest
    needs: [lint-typecheck-unit]
    # Builds on every PR to catch a broken Dockerfile early; the
    # `publish` job below re-does this build with push: true, only on
    # main, so this job intentionally never pushes.
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false

  publish:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    needs: [lint-typecheck-unit, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    # CD pipeline (Phase 10 Module 2), scoped: publishes tagged images to
    # GitHub Container Registry on every merge to main using the built-in
    # GITHUB_TOKEN — no external registry/cloud credentials needed. Actual
    # deployment (rolling the new image out to a running cluster, e.g. via
    # the manifests in k8s/) is a separate step, deliberately not wired
    # here — it needs real cluster access, which is an infra decision this
    # repo hasn't made yet.
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-web:latest
            ghcr.io/${{ github.repository }}-web:${{ github.sha }}
      - name: Push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-api:latest
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}
